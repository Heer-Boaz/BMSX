<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

	<head>
		<meta charset="utf-8" />
		<title>#title</title>
		<meta name="viewport"
			content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black">
		<meta name="apple-mobile-web-app-title" content="#title">
		<link rel="manifest" href="manifest.webmanifest">
		<link rel="apple-touch-icon" href="bmsx_icon.png">
		<link rel="icon" type="image/png" href="bmsx_icon.png">
		<link rel="shortcut icon" type="image/x-icon" href="bmsx_icon.png">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
		<style>
			/*#css*/
		</style>
	</head>

	<body>
		<div>
			<img id="msx" class="hidden" src="@@BMSX_LOGO@@" alt="MSX" hidden>
			<div id="hidor"></div>
			<div id="loading" class="coloring">Loading...</div>
			<div id="extra-message" class="coloring" hidden></div>
		
			<div id="gameContainer">
				<canvas id="gamescreen" hidden></canvas>
			</div>
		</div>
		<canvas id="bmsx-dpad-canvas" class="onscreen-surface" hidden></canvas>
		<canvas id="bmsx-action-canvas" class="onscreen-surface" hidden></canvas>
		<script id="bootrom">//#bootromjs</script>
		<script id="pacojs" distributedby="http://nodeca.github.io/pako/">//#zipjs</script>
		<script id="bload-script">
		//#debug
		window.onload = function () {
			const romurl = getRomFromUrlParameter() ?? '#outfile';
			bootrom.bload(`./${romurl}`).then(function (h406A) {
				bootrom.defusr = h406A;
				bootrom.usr(0);
			}).catch(function (err) {
				bootrom.outputError(err?.message ?? err);
			});
		}
		</script>
	</body>

</html>
