<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>
        <title>Sintervania</title>
        <meta charset="utf-8" />
        <meta name="viewport"
            content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no" />
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Sintervania" />
        <script id="romloader">//#romjs</script>
        <script id="pacojs" distributedby="http://nodeca.github.io/pako/">//#zipjs</script>
    </head>

    <body>
        <div onclick="void(0);">
            <!-- https://stackoverflow.com/questions/24077725/mobile-safari-sometimes-does-not-trigger-the-click-event -->
            <img id="msx" src="#bmsxurl" />
            <div id="hidor"></div>
            <span id="loading" class="coloring">Loading...</span>
            <svg class="buttons" style="top: 80vh; left: 80vw;">
                <circle id="btn1_knop" class="knop" cx="5vmax" cy="5vmax" r="5vmax" fill="red" />
            </svg>
            <svg class="buttons" style="top: 75vh; left: 90vw;">
                <circle id="btn2_knop" class="knop" cx="5vmax" cy="5vmax" r="5vmax" fill="blue" />
            </svg>
            <g>
                <svg class="d-pad">
                    <path id="d-pad-ru" class="dknop" d="M 50 50
                                    L 50 0
                                    A 50 50, 0, 0, 1, 85 15
                                    Z" fill="gainsboro" />
                    <path id="d-pad-r" class="dknop" d="M 50 50
                                    L 85 15
                                    A 50 50, 0, 0, 1, 100 50
                                    Z" fill="gainsboro" />
                    <path id="d-pad-rd" class="dknop" d="M 50 50
                                    L 100 50
                                    A 50 50, 0, 0, 1, 85 85
                                    Z" fill="gainsboro" />
                    <path id="d-pad-d" class="dknop" d="M 50 50
                                    L 85 85
                                    A 50 50, 0, 0, 1, 50 100
                                    Z" fill="gainsboro" />
                    <path id="d-pad-ld" class="dknop" d="M 50 50
                                    L 50 100
                                    A 50 50, 0, 0, 1, 15 85
                                    Z" fill="gainsboro" />
                    <path id="d-pad-l" class="dknop" d="M 50 50
                                    L 15 85
                                    A 50 50, 0, 0, 1, 0 50
                                    Z" fill="gainsboro" />
                    <path id="d-pad-lu" class="dknop" d="M 50 50
                                    L 0 50
                                    A 50 50, 0, 0, 1, 15 15
                                    Z" fill="gainsboro" />
                    <path id="d-pad-u" class="dknop" d="M 50 50
                                    L 15 15
                                    A 50 50, 0, 0, 1, 50 0
                                    Z" fill="gainsboro" />
                </svg>
            </g>
            <g>
                <svg id="dmid" class="d-pad dstick">

                    <circle cx="50" cy="50" r="10" fill="black" />
                </svg>
            </g>
            <canvas id="gamescreen"></canvas>
        </div>
    </body>
    <script>
        try {
            //#debug
            //#localfetch
            basic.bload("./#outfile").then(function (h406A) {
                basic.defusr = h406A;
                basic.usr(0);
            });
        }
        catch (e) {
            document.getElementById("loading").innerText = "Failed to load rom: " + e.message;
            console.error(e.message);
        }
    </script>
    <style>
        /*css*/
    </style>

</html>
