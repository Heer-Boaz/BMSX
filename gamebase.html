<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>
        <meta charset="utf-8" />
        <title>#title</title>
        <meta name="viewport"
            content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <meta name="apple-mobile-web-app-title" content="#title">
        <link rel="manifest" href="manifest.webmanifest">
        <link rel="apple-touch-icon" href="bmsx_icon.png">
        <link rel="icon" type="image/png" href="bmsx_icon.png">
        <link rel="shortcut icon" type="image/x-icon" href="bmsx_icon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <script id="bootrom">//#romjs</script>
        <script id="pacojs" distributedby="http://nodeca.github.io/pako/">//#zipjs</script>
        <!-- #vis-networkjs -->
        <style>
            /*css*/
        </style>
    </head>

    <body>
        <div>
            <img id="msx" class="hidden" src="#bmsxurl" alt="MSX" hidden>
            <div id="hidor"></div>
            <div id="loading" class="coloring" hidden>Loading...</div>
            <!-- Button controls -->
            <div id="d-pad-controls" hidden>
                <svg id="d-pad-svg" class="d-pad" viewBox="0 0 100 100" width="100px" height="100px">
                    <g id="d-pad-buttons">
                        <path id="d-pad-u" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 59.99 44.212 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            fill-rule="evenodd" transform="rotate(-27 50 50)" />
                        <path id="d-pad-ru" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 57.72 41.91 L 50 50 L 50 0 A 51 51, 0, 0, 1, 80 10"
                            fill-rule="evenodd" transform="rotate(27 50 50)" />
                        <path id="d-pad-r" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 59.99 44.212 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            fill-rule="evenodd" transform="rotate(62.5 50 50)" />
                        <path id="d-pad-rd" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 57.72 41.91 L 50 50 L 50 0 A 51 51, 0, 0, 1, 80 10"
                            fill-rule="evenodd" transform="rotate(117 50 50)" />
                        <path id="d-pad-d" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 59.99 44.212 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            fill-rule="evenodd" transform="rotate(153 50 50)" />
                        <path id="d-pad-ld" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 57.72 41.91 L 50 50 L 50 0 A 51 51, 0, 0, 1, 80 10"
                            fill-rule="evenodd" transform="rotate(207 50 50)" />
                        <path id="d-pad-l" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 59.99 44.212 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            fill-rule="evenodd" transform="rotate(243 50 50)" />
                        <path id="d-pad-lu" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 57.72 41.91 L 50 50 L 50 0 A 51 51, 0, 0, 1, 80 10"
                            fill-rule="evenodd" transform="rotate(297 50 50)" />
                    </g>
                    <g>
                        <circle id="d-pad-omheining" class="dstick" cx="50" cy="50" r="50" />
                        <circle id="d-pad-dmz" class="dstick" cx="50" cy="50" r="40" />
                        <circle id="d-pad-innercircle" class="dstick" cx="50" cy="50" r="10" />
                    </g>
                </svg>
            </div>
            <div id="button-controls" hidden>
                <svg id="action-buttons-svg" class="action-buttons" viewBox="0 0 100 220" width="100px" height="220px">
                    <g class="buttons" id="action-buttons-container">
                        <circle id="start_knop" class="knop light-blue los" cx="50" cy="200" r="20"></circle>
                        <text x="50" y="200" dominant-baseline="middle" class="knop light-blue">ST</text>

                        <circle id="select_knop" class="knop yellow los" cx="20" cy="170" r="20"></circle>
                        <text x="20" y="170" dominant-baseline="middle" class="knop yellow">SE</text>

                        <circle id="ls_knop" class="knop orange los" cx="50" cy="20" r="20"></circle>
                        <text x="50" y="20" dominant-baseline="middle" class="knop orange">LS</text>

                        <circle id="rs_knop" class="knop purple los" cx="80" cy="50" r="20"></circle>
                        <text x="80" y="50" dominant-baseline="middle" class="knop purple">RS</text>

                        <circle id="a_knop" class="knop blue los" cx="50" cy="140" r="20"></circle>
                        <text x="50" y="140" dominant-baseline="middle" class="knop blue">A</text>

                        <circle id="b_knop" class="knop red los" cx="80" cy="110" r="20"></circle>
                        <text x="80" y="110" dominant-baseline="middle" class="knop red">B</text>

                        <circle id="x_knop" class="knop pink los" cx="20" cy="110" r="20"></circle>
                        <text x="20" y="110" dominant-baseline="middle" class="knop pink">X</text>

                        <circle id="y_knop" class="knop green los" cx="50" cy="80" r="20"></circle>
                        <text x="50" y="80" dominant-baseline="middle" class="knop green">Y</text>
                    </g>
                </svg>
            </div>
            <div id="gameContainer">
                <canvas id="gamescreen" hidden></canvas>
                <div id="debugPanel" hidden>
                    <svg id="pauseResumeButton" class="debugIcon" viewBox="0 0 32 32" onclick="pauseResumeGame();">
                        <rect x="8" y="6" width="5" height="20" fill="#2196f3" />
                        <rect x="19" y="6" width="5" height="20" fill="#2196f3" />
                    </svg>
                    <!-- Quick Save State Button -->
                    <svg id="quickSaveButton" class="debugIcon" viewBox="0 0 32 32" onclick="quickSaveState();">
                        <rect x="4" y="4" width="24" height="20" fill="#4caf50" />
                        <rect x="8" y="12" width="16" height="12" fill="#2e7d32" />
                        <rect x="12" y="4" width="10" height="6" fill="#aaaaaa" />
                        <!-- <circle cx="16" cy="16" r="4" fill="#ffeb3b" /> -->
                        <polygon points="16,6 20,10 16,14 12,10" fill="#ffffff" />
                    </svg>

                    <!-- Quick Load State Button -->
                    <svg id="quickLoadButton" class="debugIcon" viewBox="0 0 32 32" onclick="quickLoadState();">
                        <rect x="4" y="4" width="24" height="20" fill="#2196f3" />
                        <rect x="8" y="12" width="16" height="12" fill="#0d47a1" />
                        <rect x="12" y="4" width="10" height="6" fill="#aaaaaa" />
                        <!-- <circle cx="16" cy="16" r="4" fill="#ffeb3b" /> -->
                        <polygon points="16,22 12,18 20,18" fill="#ffffff" />
                    </svg>

                    <!-- Open Debug Tools Button -->
                    <svg id="openDebugToolsButton" class="debugIcon" viewBox="0 0 32 32" onclick="openDebugTools();">
                        <circle cx="16" cy="16" r="12" fill="#f44336" />
                        <path d="M 16 4 L 16 12 M 16 20 L 16 28 M 4 16 L 12 16 M 20 16 L 28 16" stroke="#b71c1c"
                            stroke-width="2" />
                    </svg>
                </div>
            </div>
        </div>
    </body>
    <script>
        //#debug
        bootrom.romname = '#romname';
        bootrom.bload('./#outfile').then(function (h406A) {
            bootrom.defusr = h406A;
            bootrom.usr(0);
        }).catch(function (err) {
            bootrom.outputError(err?.message ?? err);
        });
    </script>

</html>
