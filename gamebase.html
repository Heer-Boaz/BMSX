<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>
        <title>#title</title>
        <meta charset="utf-8" />
        <meta name="viewport"
            content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no" />
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="#title" />
        <link rel="manifest" href="manifest.json">
        <script id="bootrom">//#romjs</script>
        <script id="pacojs" distributedby="http://nodeca.github.io/pako/">//#zipjs</script>
        <script id="flattedjs" distributedby="https://github.com/WebReflection/flatted#flatted">//#flattedjs</script>
    </head>

    <body>
        <!-- https://stackoverflow.com/questions/24077725/mobile-safari-sometimes-does-not-trigger-the-click-event -->
        <div onclick="void(0);">
            <img id="msx" class="hidden" src="#bmsxurl" hidden/>
            <div id="hidor"></div>
            <span id="loading" class="coloring" hidden>Loading...</span>
            <span id="controls" hidden>
                <svg class="buttons" style="top: 75vh; left: 80vw;">
                    <circle id="btn1_knop" class="knop red los" cx="5vmax" cy="5vmax" r="5vmax" fill="transparent"/>
                </svg>
                <svg class="buttons" style="top: 75vh; left: 90vw;">
                    <circle id="btn2_knop" class="knop blue los" cx="5vmax" cy="5vmax" r="5vmax" fill="transparent"/>
                </svg>
                <svg class="buttons" style="top: 55vh; left: 80vw;">
                    <circle id="btn3_knop" class="knop green los" cx="5vmax" cy="5vmax" r="5vmax" fill="transparent"/>
                </svg>
                <svg class="buttons" style="top: 55vh; left: 90vw;">
                    <circle id="btn4_knop" class="knop yellow los" cx="5vmax" cy="5vmax" r="5vmax" fill="transparent"/>
                </svg>
                <svg class="d-pad">
                    <g>
                        <path id="d-pad-u" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 57.99 44.212 L 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"
                            fill-rule="evenodd" transform="rotate(-27 50 50)" />
                        <path id="d-pad-ru" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 55.72 41.91 L 50 50 L 50 0 A 50 50, 0, 0, 1, 79 9"
                            fill-rule="evenodd" transform="rotate(27 50 50)" />
                        <path id="d-pad-r" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 57.99 44.212 L 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"
                            fill-rule="evenodd" transform="rotate(62.5 50 50)" />
                        <path id="d-pad-rd" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 55.72 41.91 L 50 50 L 50 0 A 50 50, 0, 0, 1, 79 9"
                            fill-rule="evenodd" transform="rotate(117 50 50)" />
                        <path id="d-pad-d" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 57.99 44.212 L 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"
                            fill-rule="evenodd" transform="rotate(153 50 50)" />
                        <path id="d-pad-ld" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 55.72 41.91 L 50 50 L 50 0 A 50 50, 0, 0, 1, 79 9"
                            fill-rule="evenodd" transform="rotate(207 50 50)" />
                        <path id="d-pad-l" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 57.99 44.212 L 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"
                            fill-rule="evenodd" transform="rotate(243 50 50)" />
                        <path id="d-pad-lu" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 55.72 41.91 L 50 50 L 50 0 A 50 50, 0, 0, 1, 79 9"
                            fill-rule="evenodd" transform="rotate(297 50 50)" />
                    </g>
                    <g>
                        <circle class="d-pad-omheining" cx="50" cy="50" r="10" />
                        <circle class="d-pad-omheining" cx="50" cy="50" r="49" />
                        <circle id="dmid" class="dstick" cx="50" cy="50" r="10" />
                    </g>
                </svg>
            </span>
            <canvas id="gamescreen" hidden></canvas>
        </div>
    </body>
    <script>
        try {
            //#debug
            //#localfetch
            bootrom.bload("./#outfile").then(function (h406A) {
                bootrom.defusr = h406A;
                bootrom.usr(0);
            });
        }
        catch (e) {
            document.getElementById("loading").innerText = "Failed to load rom: " + e.message;
            console.error(e.message);
        }
    </script>
    <style>
        /*css*/
    </style>

</html>
