<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>
        <title>Sintervania</title>
        <meta charset="utf-8" />
        <meta name="viewport"
            content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no" />
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Sintervania" />
        <script id="romloader">//#romjs</script>
        <script id="pacojs" distributedby="http://nodeca.github.io/pako/">//#zipjs</script>
    </head>

    <body>
        <div onclick="void(0);">
            <!-- https://stackoverflow.com/questions/24077725/mobile-safari-sometimes-does-not-trigger-the-click-event -->
            <img id="msx" src="#bmsxurl" />
            <div id="hidor"></div>
            <span id="loading" class="coloring">Loading...</span>
            <svg class="buttons" style="top: 75vh; left: 75vw;">
                <circle id="btn1_knop" class="knop" cx="7vmax" cy="7vmax" r="7vmax" fill="transparent" stroke="red"/>
            </svg>
            <svg class="buttons" style="top: 70vh; left: 85vw;">
                <circle id="btn2_knop" class="knop" cx="7vmax" cy="7vmax" r="7vmax" fill="transparent" stroke="blue" />
            </svg>
            <svg class="buttons" style="top: 50vh; left: 75vw;">
                <circle id="btn3_knop" class="knop" cx="7vmax" cy="7vmax" r="7vmax" fill="transparent" stroke="green" />
            </svg>
            <svg class="buttons" style="top: 45vh; left: 85vw;">
                <circle id="btn4_knop" class="knop" cx="7vmax" cy="7vmax" r="7vmax" fill="transparent" stroke="yellow" />
            </svg>
            <svg class="d-pad">
                <g>
                    <path id="d-pad-u" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"  transform="rotate(-27 50 50)" />
                    <path id="d-pad-ru" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 79 9 Z"  transform="rotate(27 50 50)" />
                    <path id="d-pad-r" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"  transform="rotate(62.5 50 50)" />
                    <path id="d-pad-rd" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 79 10 Z" transform="rotate(117 50 50)" />
                    <path id="d-pad-d" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"  transform="rotate(153 50 50)" />
                    <path id="d-pad-ld" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 79 10 Z" transform="rotate(207 50 50)" />
                    <path id="d-pad-l" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"  transform="rotate(243 50 50)" />
                    <path id="d-pad-lu" class="dknop" d="M 50 50 L 50 0 A 50 50, 0, 0, 1, 79 10 Z" transform="rotate(297 50 50)" />
                </g>
                <g>
                    <circle id="dmid" class="dstick" cx="50" cy="50" r="5"/>
                </g>
            </svg>
            </svg>
            <canvas id="gamescreen"></canvas>
        </div>
    </body>
    <script>
        try {
            //#debug
            //#localfetch
            basic.bload("./#outfile").then(function (h406A) {
                basic.defusr = h406A;
                basic.usr(0);
            });
        }
        catch (e) {
            document.getElementById("loading").innerText = "Failed to load rom: " + e.message;
            console.error(e.message);
        }
    </script>
    <style>
        /*css*/
    </style>

</html>
