<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>
        <meta charset="utf-8" />
        <title>#title</title>
        <meta name="viewport"
            content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <meta name="apple-mobile-web-app-title" content="#title">
        <link rel="manifest" href="manifest.webmanifest">
        <link rel="apple-touch-icon" href="bmsx_icon.png">
        <link rel="icon" type="image/png" href="bmsx_icon.png">
        <link rel="shortcut icon" type="image/x-icon" href="bmsx_icon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <script id="bootrom">//#romjs</script>
        <script id="pacojs" distributedby="http://nodeca.github.io/pako/">//#zipjs</script>
        <!-- #vis-networkjs -->
        <style>
            /*css*/
        </style>
    </head>

    <body>
        <div>
            <img id="msx" class="hidden" src="#bmsxurl" alt="MSX" hidden>
            <div id="hidor"></div>
            <div id="loading" class="coloring" hidden>Loading...</div>
            <!-- Button controls -->
            <div id="d-pad-controls" hidden>
                <svg id="d-pad-svg" class="d-pad" viewBox="0 0 100 100" width="100px" height="100px">
                    <defs>
                        <filter id="dPadFilter" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#888888" result="specOut">
                                <fePointLight x="0" y="0" z="10000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>
                        <filter id="dPadFilterUp" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="0" y="-10000" z="20000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>

                        <!-- Filter for down direction -->
                        <filter id="dPadFilterDown" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="0" y="10000" z="20000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>

                        <!-- Filter for left direction -->
                        <filter id="dPadFilterLeft" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="-10000" y="0" z="20000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>

                        <!-- Filter for right direction -->
                        <filter id="dPadFilterRight" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="10000" y="0" z="20000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>
                        <!-- Filter for left-up direction -->
                        <filter id="dPadFilterLeftUp" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="-10000" y="-10000" z="30000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>

                        <!-- Filter for right-up direction -->
                        <filter id="dPadFilterRightUp" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="10000" y="-10000" z="30000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>

                        <!-- Filter for right-down direction -->
                        <filter id="dPadFilterRightDown" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="10000" y="10000" z="30000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>

                        <!-- Filter for left-down direction -->
                        <filter id="dPadFilterLeftDown" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="-10000" y="10000" z="30000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>
                    </defs>
                    <g id="d-pad-buttons">
                        <path id="d-pad-u" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 60 44 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            transform="rotate(-27 50 50)" />
                        <path id="d-pad-ru" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 58 42 L 50 50 L 50 0 A 51 51, 0, 0, 1, 80 10"
                            transform="rotate(27 50 50)" />
                        <path id="d-pad-r" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 60 44 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            transform="rotate(63 50 50)" />
                        <path id="d-pad-rd" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 58 42 L 50 50 L 50 0 A 51 51, 0, 0, 1, 80 10"
                            transform="rotate(117 50 50)" />
                        <path id="d-pad-d" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 60 44 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            transform="rotate(153 50 50)" />
                        <path id="d-pad-ld" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 58 42 L 50 50 L 50 0 A 51 51, 0, 0, 1, 80 10"
                            transform="rotate(207 50 50)" />
                        <path id="d-pad-l" class="dknop los"
                            d="M 50 50 L 50 39 A 11 11, 0, 0, 1, 60 44 L 50 50 L 50 0 A 51 51, 0, 0, 1, 91 21 Z"
                            transform="rotate(243 50 50)" />
                        <path id="d-pad-lu" class="dknop los"
                            d="M 50 50 L 50 38 A 11 11, 0, 0, 1, 50 50 L 50 50 L 50 0 A 52 52, 0, 0, 1, 82 12"
                            transform="rotate(297 50 50)" />
                    </g>
                    <g>
                        <circle id="d-pad-omheining" class="dstick" cx="50" cy="50" r="50" />
                    </g>
                </svg>
            </div>
            <div id="button-controls" hidden>
                <svg id="action-buttons-svg" class="action-buttons" viewBox="0 0 100 220" width="100px" height="220px">
                    <defs>
                        <filter id="buttonFilter" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="-5000" y="-10000" z="20000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>
                        <filter id="pressedButtonFilter" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant=".5" specularExponent="30"
                                lighting-color="#AAAAAA" result="specOut">
                                <fePointLight x="-5000" y="-10000" z="5000" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
                            <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1"
                                k4="0" />
                        </filter>
                    </defs>
                    <g class="buttons" id="action-buttons-container">
                        <circle id="start_knop" class="knop light-blue los" cx="50" cy="200" r="20"></circle>
                        <text id="start_knop_text" x="50" y="200" dominant-baseline="middle"
                            class="knop knoptext los">ST</text>

                        <circle id="select_knop" class="knop yellow los" cx="20" cy="170" r="20"></circle>
                        <text id="select_knop_text" x="20" y="170" dominant-baseline="middle"
                            class="knop knoptext los">SE</text>

                        <circle id="ls_knop" class="knop orange los" cx="50" cy="20" r="20"></circle>
                        <text id="ls_knop_text" x="50" y="20" dominant-baseline="middle"
                            class="knop knoptext los">LS</text>

                        <circle id="rs_knop" class="knop purple los" cx="80" cy="50" r="20"></circle>
                        <text id="rs_knop_text" x="80" y="50" dominant-baseline="middle"
                            class="knop knoptext los">RS</text>

                        <circle id="a_knop" class="knop blue los" cx="50" cy="140" r="20"></circle>
                        <text id="a_knop_text" x="50" y="140" dominant-baseline="middle"
                            class="knop knoptext los">A</text>

                        <circle id="b_knop" class="knop red los" cx="80" cy="110" r="20"></circle>
                        <text id="b_knop_text" x="80" y="110" dominant-baseline="middle"
                            class="knop knoptext los">B</text>

                        <circle id="x_knop" class="knop pink los" cx="20" cy="110" r="20"></circle>
                        <text id="x_knop_text" x="20" y="110" dominant-baseline="middle"
                            class="knop knoptext los">X</text>

                        <circle id="y_knop" class="knop green los" cx="50" cy="80" r="20"></circle>
                        <text id="y_knop_text" x="50" y="80" dominant-baseline="middle"
                            class="knop knoptext los">Y</text>
                    </g>
                </svg>
            </div>
            <div id="gameContainer">
                <canvas id="gamescreen" hidden></canvas>
            </div>
        </div>
    </body>
    <script>
        //#debug
        const romurl = getRomFromUrlParameter() ?? '#outfile';
        bootrom.bload(`./${romurl}`).then(function (h406A) {
            bootrom.defusr = h406A;
            bootrom.usr(0);
        }).catch(function (err) {
            bootrom.outputError(err?.message ?? err);
        });
    </script>

</html>
