<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>
        <title>#title</title>
        <meta charset="utf-8" />

            content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no" />

        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="apple-mobile-web-app-title" content="#title" />
        <link rel="manifest" href="manifest.webmanifest">
        <script id="bootrom">//#romjs</script>
        <script id="pacojs" distributedby="http://nodeca.github.io/pako/">//#zipjs</script>
    </head>

    <body>
        <!-- https://stackoverflow.com/questions/24077725/mobile-safari-sometimes-does-not-trigger-the-click-event -->

        <div>
            <img id="msx" class="hidden" src="#bmsxurl" hidden />
            <div id="hidor"></div>
            <span id="loading" class="coloring" hidden>Loading...</span>
            <span id="controls" hidden>

                </svg>
                <svg class="buttons" style="top: 20vh; left: 85vw;">
                    <circle id="btn4_knop" class="knop yellow los" cx="4vmax" cy="4vmax" r="4vmax" fill="transparent" />
                </svg>
                <svg class="d-pad">
                    <g>
                        <path id="d-pad-u" class="dknop los"

                        <path id="d-pad-r" class="dknop los"

                            fill-rule="evenodd" transform="rotate(62.5 50 50)" />
                        <path id="d-pad-rd" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 55.72 41.91 L 50 50 L 50 0 A 50 50, 0, 0, 1, 79 9"
                            fill-rule="evenodd" transform="rotate(117 50 50)" />
                        <path id="d-pad-d" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 57.99 44.212 L 50 50 L 50 0 A 50 50, 0, 0, 1, 90 21 Z"

                        <path id="d-pad-ld" class="dknop los"

                        <path id="d-pad-l" class="dknop los"

                            fill-rule="evenodd" transform="rotate(243 50 50)" />
                        <path id="d-pad-lu" class="dknop los"
                            d="M 50 50 L 50 40 A 10 10, 0, 0, 1, 55.72 41.91 L 50 50 L 50 0 A 50 50, 0, 0, 1, 79 9"
                            fill-rule="evenodd" transform="rotate(297 50 50)" />
                    </g>
                    <g>
                        <circle class="d-pad-omheining" cx="50" cy="50" r="10" />
                        <circle class="d-pad-omheining" cx="50" cy="50" r="49" />
                        <circle id="dmid" class="dstick" cx="50" cy="50" r="10" />
                    </g>
                </svg>
            </span>
            <canvas id="gamescreen" hidden></canvas>
        </div>
    </body>
    <script>
        //#debug
        //#localfetch
        bootrom.bload("./#outfile").then(function (h406A) {
            bootrom.defusr = h406A;
            bootrom.usr(0);
        }).catch(function(err) {
            bootrom.theshowsover = true;
            document.querySelector('#loading').hidden = false;
            document.querySelector('#msx').onanimationend = undefined;
            document.querySelector('#hidor').className = 'showsover';
            document.body.className = "showsover";
            bootrom.outputError(err?.message ?? err);
        });
    </script>
    <style>
        /*css*/
    </style>

</html>
