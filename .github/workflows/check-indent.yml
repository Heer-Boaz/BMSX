name: Check indentation

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  indent-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run indentation check
        run: npm run check:indent
