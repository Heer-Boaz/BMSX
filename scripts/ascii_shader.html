<!DOCTYPE html>
<html>

    <head>
        <style>
            body {
                margin: 0;
                font-family: monospace;
            }

            canvas {
                display: block;
            }
        </style>
    </head>

    <body>
        <canvas id="canvas"></canvas>
        <script>
            const canvas = document.getElementById('canvas');
            const gl = canvas.getContext('webgl');

            if (!gl) {
                alert('WebGL is not supported in your browser.');
            }


            const vertShaderSrc = `
      attribute vec4 a_position;
      attribute vec2 a_texCoord;
      varying vec2 v_texCoord;
      void main() {
        gl_Position = a_position;
        v_texCoord = a_texCoord;
      }
    `;

            const fragShaderSrc = `
      precision mediump float;
      uniform sampler2D u_image;
      varying vec2 v_texCoord;
      uniform float u_pixelSize;
      const float ASCII_CHARS = 256.0;
      const float charAspect = 1.2;
      void main() {
        vec2 pixel = floor(v_texCoord / u_pixelSize) * u_pixelSize;
        vec4 color = texture2D(u_image, pixel);
        float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114));
        float index = gray * (ASCII_CHARS - 1.0);
        float row = floor(index / 16.0);
        float col = index - row * 16.0;
        vec2 uv = (pixel + vec2(col, row) * u_pixelSize) / (16.0 * u_pixelSize * charAspect);
        gl_FragColor = vec4(color.rgb, step(0.5, texture2D(u_image, uv).a));
      }
    `;

            // Create shaders
            const vertShader = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vertShader, vertShaderSrc);
            gl.compileShader(vertShader);

            const fragShader = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fragShader, fragShaderSrc);
            gl.compileShader(fragShader);

            // Create program
            const program = gl.createProgram();
            gl.attachShader(program, vertShader);
            gl.attachShader(program, fragShader);
            gl.linkProgram(program);

            // Create buffers
            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
                -1, -1,
                1, -1,
                -1, 1,
                1, 1
            ]), gl.STATIC_DRAW);

            const texCoordBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
                0, 1,
                1, 1,
                0, 0,
                1, 0
            ]), gl.STATIC_DRAW);

            // Create texture
            const texture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 255, 255]));
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            function render(image) {
                canvas.width = image.width;
                canvas.height = image.height;

                // Update texture with the image
                gl.bindTexture(gl.TEXTURE_2D, texture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image);

                // Set viewport
                gl.viewport(0, 0, canvas.width, canvas.height);

                // Clear the canvas
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);

                // Use the shader program
                gl.useProgram(program);

                // Set attributes
                const positionLocation = gl.getAttribLocation(program, 'a_position');
                gl.enableVertexAttribArray(positionLocation);
                gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

                const texCoordLocation = gl.getAttribLocation(program, 'a_texCoord');
                gl.enableVertexAttribArray(texCoordLocation);
                gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
                gl.vertexAttribPointer(texCoordLocation, 2, gl.FLOAT, false, 0, 0);

                // Set uniforms
                const u_image = gl.getUniformLocation(program, 'u_image');
                gl.uniform1i(u_image, 0);

                const u_pixelSize = gl.getUniformLocation(program, 'u_pixelSize');
                gl.uniform1f(u_pixelSize, 1.0 / 32.0); // You can adjust the ASCII resolution here

                // Draw the rectangle
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            }

            // Load an example image
            const image = new Image();
            image.src = '../src//testrom/res/_ignore/rokvoorbeeld.png'; // Replace with a valid image URL
            image.onload = () => render(image);
        </script>
    </body>

</html>
