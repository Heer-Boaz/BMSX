        <script src="https://unpkg.com/systemjs@2.1.1/dist/extras/named-register.js"></script>
        <script src="./BoazEngineJS/rom.js"></script>
        <script type="module">
            loadRom("http://127.0.0.1:8887/rom/packed.rom")
                .then(rom => {
                    let romcode = document.createElement('script')
                    romcode.setAttribute("type", "text/javascript")
                    romcode.innerText = rom.source;
                    document.getElementsByTagName('head')[0].appendChild(romcode);
                    System.import('src/bootstrapper').then(function (entry) {
                        entry.Bootstrapper.bootTheGame(rom);
                    });
                })
                .catch(console.error);
        </script>
