<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

    <head>
        <title>Sintervania</title>
        <meta charset="utf-8" />
        <meta name="viewport"
            content="width=device-width,initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no" />
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Sintervania" />
        <link rel="stylesheet" type="text/css" href="./game.css" />
        <script src="https://code.jquery.com/jquery-3.4.1.min.js"
            integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
        <script src="https://unpkg.com/systemjs@2.1.1/dist/s.js"></script>
        <script src="https://unpkg.com/systemjs@2.1.1/dist/extras/named-register.js"></script>
        <script src="./rom/rom.js"></script>
        <script src="./rom/thegame.js"></script>
    </head>

    <body id="body">
        <script type="module">
            // basic.bload("http://127.0.0.1:8887/rom/packed.rom")
            basic.bload("./rom/packed.rom").then(h406A => {
                basic.debug = true;
                basic.defusr = h406A;
                basic.usr(0);
            }).catch(console.error);
        </script>
        <div><img id="loading" class="appear" src="rom/loading.png" />
        </div>
        <canvas id="gamescreen"></canvas>
    </body>

    <style>
        html,
        body {
            position: fixed;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            /* touch-callout: none; */
            -webkit-tap-highlight-color: transparent;
            /* tap-highlight-color: transparent; */
            -webkit-text-size-adjust: none;
            -moz-text-size-adjust: none;
            text-size-adjust: none;
            overflow: hidden;
            background-color: black;
        }

        html {
            width: 100vw;
            /* height: 100vh; */
            height: 100%;
            touch-action: manipulation;
        }

        body {
            min-height: 100%;
            width: 100vw;
            height: 100%;
            overflow: hidden;
        }

        img {
            pointer-events: none;
            touch-action: none;
        }

        #gamescreen {
            position: absolute;
            top: 0px;
            left: 0px;
            overflow: hidden;
        }

        #loading {
            z-index: 1001;
            display: block;
            margin-left: auto;
            margin-right: auto;
            width: 40%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #loading.appear {
            animation: fadein 1.0s infinite linear alternate;
        }

        #loading.fadeout {
            animation: fadeout 1.0s linear forwards;
        }

        @keyframes fadein {
            from {
                opacity: .3;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>

</html>
