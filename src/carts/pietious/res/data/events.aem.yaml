events:
    room.enter:
        channel: music
        max_voices: 1
        rules:
            - when:
                  equals:
                      daemon_fight_active: true
              go:
                  music_transition:
                      audio_id: music_daemonfight
            - when:
                  equals:
                      has_active_seal: true
              go:
                  music_transition:
                      audio_id: music_seal_2
            - when:
                  equals:
                      world_number: 0
              go:
                  music_transition:
                      audio_id: music_castle
                      fade_ms: 250
            - when:
                  not:
                      equals:
                          world_number: 0
              go:
                  music_transition:
                      audio_id: music_world

    seal.begin:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_seal_2
                      sync:
                          stinger: music_seal_1

    seal_dissolution:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonappears
                      loop: false
                      sync:
                          stinger: seal_breakdown

    death.restart:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonappears
                      loop: false

    daemon.activate:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonfight

    death.resume:
        channel: music
        max_voices: 1
        rules:
            - when:
                  equals:
                      daemon_fight_active: true
              go:
                  music_transition:
                      audio_id: music_daemonfight
            - when:
                  equals:
                      has_active_seal: true
              go:
                  music_transition:
                      audio_id: music_seal_2
            - when:
                  equals:
                      world_number: 0
              go:
                  music_transition:
                      audio_id: music_castle
                      fade_ms: 250
            - when:
                  not:
                      equals:
                          world_number: 0
              go:
                  music_transition:
                      audio_id: music_world

    enemy.defeated:
