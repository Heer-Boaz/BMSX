events:
    director.state_changed:
        channel: music
        max_voices: 1
        rules:
            - when:
                  equals:
                      state: castle
              go:
                  music_transition:
                      audio_id: music_castle
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      state: world
              go:
                  music_transition:
                      audio_id: music_world
                      sync: immediate
            - when:
                  equals:
                      state: seal
                      transition_kind: item_close
              go:
                  music_transition:
                      audio_id: music_seal_2
                      sync: immediate
            - when:
                  equals:
                      state: seal
              go:
                  music_transition:
                      audio_id: music_seal_2
                      sync:
                          stinger: music_seal_1
            - when:
                  equals:
                      state: seal_dissolution
              go:
                  music_transition:
                      audio_id: music_daemonappears
                      loop: false
                      sync:
                          stinger: seal_breakdown
            - when:
                  equals:
                      state: daemon_fight
              go:
                  music_transition:
                      audio_id: music_daemonfight
                      sync: immediate
            - when:
                  equals:
                      state: shrine
              go:
                  music_transition:
                      audio_id: music_shrine_2
                      sync:
                          stinger: shrine1
            - when:
                  equals:
                      state: lithograph
              go:
                  music_transition:
                      audio_id: music_lithograph2
                      sync:
                          stinger: music_lithograph1

