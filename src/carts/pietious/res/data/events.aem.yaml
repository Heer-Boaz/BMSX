events:
    flow.state_changed:
        channel: music
        max_voices: 1
        rules:
            - when:
                  equals:
                      state: castle
              go:
                  music_transition:
                      audio_id: music_castle
                      sync: immediate
            - when:
                  equals:
                      state: world
              go:
                  music_transition:
                      audio_id: music_world
                      sync: immediate
            - when:
                  equals:
                      state: transition
              go:
                  music_transition:
                      audio_id: music_shrine_1
                      sync: loop

    enemy.defeated:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: foeexplosion
    sword_start_quiet:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: slice
    sword_start_walking_right:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: slice
    sword_start_walking_left:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: slice

    sword_start_jumping:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: slice

    sword_start_controlled_fall:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: slice

    sword_start_uncontrolled_fall:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: slice

    sword_start_stairs:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  audio_id: slice

