events:
    # --- Music routing (no room-id checks) ---
    room.enter:
        channel: music
        rules: &room_music_rules
            - when:
                  equals:
                      daemon_fight_active: true
                      suppress_room_music: false
              go:
                  music_transition:
                      audio_id: music_daemonfight
            - when:
                  equals:
                      has_active_seal: true
                      suppress_room_music: false
              go:
                  music_transition:
                      audio_id: music_seal_2
                      sync:
                          stinger: music_seal_1
            - when:
                  equals:
                      world_number: 0
                      suppress_room_music: false
              go:
                  music_transition:
                      audio_id: music_castle
            - when:
                  equals:
                      suppress_room_music: false
              go:
                  music_transition:
                      audio_id: music_world

    shrine_exit_done:
        channel: music
        rules: *room_music_rules

    title:
        channel: music
        rules:
            - go:
                  stop_music: true

    story:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_story
                      start_fresh: true

    shrine:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_shrine_2
                      sync:
                          stinger: music_shrine_1

    lithograph:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_lithograph2
                      sync:
                          stinger: music_lithograph1

    ending:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_epilogue
                      sync:
                          stinger: music_epiloguestart

    victory_dance:
        channel: sfx
        policy: queue
        rules:
            - go:
                  sequence:
                      - stop_music: true
                      - audio_id: pickupkey
                      - audio_id: danceofjoy

    # Seal breakdown -> daemon appears (music).
    # The daemon-fight cue is scheduled later (daemon_appearance_done), to avoid canceling the stinger.
    seal_dissolution:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonappears
                      sync:
                          stinger: seal_breakdown

    # After death in a broken-seal room: restart the daemon-appearance music segment from the start.
    daemon_appearance:
        channel: music
        rules:
            - when:
                  equals:
                      after_death: true
              go:
                  music_transition:
                      audio_id: music_daemonappears
                      start_fresh: true

    # Daemon appears -> daemon fight (wait for loop/end of current segment).
    daemon_appearance_done:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonfight
                      sync: loop

    # --- SFX routing ---
    jump:
        channel: sfx
        rules:
            - go:
                  audio_id: jump

    fall:
        channel: sfx
        rules:
            - go:
                  audio_id: fall

    water_transition:
        channel: sfx
        rules:
            - go:
                  audio_id: watersplash

    hit:
        channel: sfx
        rules:
            - go:
                  audio_id: hit

    approachingdeath:
        channel: sfx
        rules:
            - go:
                  audio_id: approachingdeath

    dying:
        channel: sfx
        rules:
            - go:
                  sequence:
                      - stop_music: true
                      - audio_id: dying

    enter_world_start:
        channel: sfx
        rules:
            - go:
                  sequence:
                      - stop_music: true
                      - audio_id: enterleave

    enter_shrine_start:
        channel: sfx
        rules:
            - go:
                  sequence:
                      - stop_music: true
                      - audio_id: enterleave

    player.shrine_overlay_exit:
        channel: music
        rules:
            - go:
                  stop_music: true

    leave_shrine_overlay:
        channel: sfx
        rules:
            - go:
                  audio_id: enterleave

    world_emerge_start:
        channel: sfx
        rules:
            - go:
                  sequence:
                      - stop_music: true
                      - audio_id: enterleave

    world_emerge_done:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_castle

    worlddooropen:
        channel: sfx
        rules:
            - go:
                  audio_id: worlddooropen

    sword_start:
        channel: sfx
        rules:
            - go:
                  audio_id: slice

    fire_pepernoot:
        channel: sfx
        rules:
            - go:
                  audio_id: pepernoot

    pickupitem:
        channel: sfx
        rules:
            - go:
                  audio_id: pickupitem

    worldkey:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_castle
                      sync:
                          stinger: pickupkey

    healing:
        channel: sfx
        rules:
            - go:
                  audio_id: healing

    f1:
        channel: sfx
        rules:
            - go:
                  audio_id: f1

    select:
        channel: sfx
        rules:
            - go:
                  audio_id: select

    title_start:
        channel: sfx
        rules:
            - go:
                  audio_id: gamestart

    d.bw.s:
        channel: sfx
        rules:
            - go:
                  audio_id: gamestart

    halo_resolved_from_world:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: music_castle
                      fade_ms: 2480

    world_leave_transition_start:
        channel: music
        rules:
            - go:
                  stop_music:
                      fade_ms: 2480

    damage.resolved:
        channel: sfx
        rules:
            - when:
                  and:
                      - equals:
                            status: applied
                            destroyed: true
                      - not:
                            in:
                                target_kind:
                                    - breakablewall
                                    - disappearingwall
              go:
                  audio_id: foeexplosion
            - when:
                  equals:
                      status: applied
                      destroyed: false
              go:
                  audio_id: foedamage

    paperspawn:
        channel: sfx
        rules:
            - go:
                  audio_id: paperspawn

    muzieknootspawn:
        channel: sfx
        rules:
            - go:
                  audio_id: muzieknootspawn

    cross:
        channel: sfx
        rules:
            - go:
                  audio_id: cross

    crossland:
        channel: sfx
        rules:
            - go:
                  audio_id: crossland

    d.bp.c:
        channel: sfx
        rules:
            - go:
                  audio_id: appearance

    staffspawn:
        channel: sfx
        rules:
            - go:
                  audio_id: daemonfire

    # Intentionally no SFX hook for daemon_appearance here:
    # In the original XNA/C++ versions, daemon appearance is driven by the music sequence
    # (SealBreakDown -> DaemonAppears -> DaemonFight), not a separate "spawn" SFX.
