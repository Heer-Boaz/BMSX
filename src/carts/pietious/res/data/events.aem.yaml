events:
    # --- Music routing (no room-id checks) ---
    room.enter:
        channel: music
        max_voices: 1
        rules:
            - when:
                  equals:
                      world_number: 0
              go:
                  music_transition:
                      audio_id: music_castle
            - when:
                  equals:
                      daemon_fight_active: true
              go:
                  music_transition:
                      audio_id: music_daemonfight
            - when:
                  equals:
                      has_active_seal: true
              go:
                  music_transition:
                      audio_id: music_seal_2
                      sync:
                          stinger: music_seal_1
            - go:
                  music_transition:
                      audio_id: music_world

    # Re-apply the same music rules after death/respawn without requiring a room switch.
    death.resume:
        channel: music
        max_voices: 1
        rules:
            - when:
                  equals:
                      world_number: 0
              go:
                  music_transition:
                      audio_id: music_castle
            - when:
                  equals:
                      daemon_fight_active: true
              go:
                  music_transition:
                      audio_id: music_daemonfight
            - when:
                  equals:
                      has_active_seal: true
              go:
                  music_transition:
                      audio_id: music_seal_2
                      sync:
                          stinger: music_seal_1
            - go:
                  music_transition:
                      audio_id: music_world

    # Seal breakdown -> daemon appears (music).
    # The daemon-fight cue is scheduled later by the daemon.activate event, to avoid canceling the stinger.
    seal_dissolution:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonappears
                      sync:
                          stinger: seal_breakdown

    # After death in a broken-seal room: restart the daemon-appearance music segment from the start.
    death.restart:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonappears
                      start_fresh: true

    # Daemon appears -> daemon fight (wait for loop/end of current segment).
    daemon.activate:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_daemonfight
                      sync: loop

    # --- SFX routing ---
    jump:
        channel: sfx
        rules:
            - go:
                  audio_id: jump

    fall:
        channel: sfx
        rules:
            - go:
                  audio_id: fall

    hit:
        channel: sfx
        policy: replace
        rules:
            - go:
                  audio_id: hit
                  cooldown_ms: 40

    approachingdeath:
        channel: sfx
        max_voices: 1
        rules:
            - go:
                  audio_id: approachingdeath

    dying:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_castle
                      sync:
                          stinger: dying
                          return_to_previous: true

    enterleave:
        channel: sfx
        rules:
            - go:
                  audio_id: enterleave

    worlddooropen:
        channel: sfx
        rules:
            - go:
                  audio_id: worlddooropen

    rotatedoor:
        channel: sfx
        rules:
            - go:
                  audio_id: rotatedoor

    sword_start:
        channel: sfx
        rules:
            - go:
                  audio_id: slice

    fire_pepernoot:
        channel: sfx
        rules:
            - go:
                  audio_id: pepernoot

    pickupitem:
        channel: sfx
        rules:
            - go:
                  audio_id: pickupitem

    worldkey:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: music_castle
                      sync:
                          stinger: pickupkey
                          return_to_previous: true

    healing:
        channel: sfx
        rules:
            - go:
                  audio_id: healing

    f1:
        channel: sfx
        rules:
            - go:
                  audio_id: f1

    select:
        channel: sfx
        rules:
            - go:
                  audio_id: select

    gamestart:
        channel: sfx
        rules:
            - go:
                  audio_id: gamestart

    foedamage:
        channel: sfx
        policy: replace
        rules:
            - go:
                  audio_id: foedamage
                  cooldown_ms: 30

    enemy.defeated:
        channel: sfx
        rules:
            - go:
                  audio_id: foeexplosion
                  cooldown_ms: 30

    paperspawn:
        channel: sfx
        rules:
            - go:
                  audio_id: paperspawn

    muzieknootspawn:
        channel: sfx
        rules:
            - go:
                  audio_id: muzieknootspawn

    cross:
        channel: sfx
        rules:
            - go:
                  audio_id: cross

    crossland:
        channel: sfx
        rules:
            - go:
                  audio_id: crossland

    appearance:
        channel: sfx
        rules:
            - go:
                  audio_id: appearance

    daemon_appearance:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - go:
                  one_of:
                      - daemon_spawn
                      - daemon_spawn2
                  pick: uniform
                  avoid_repeat: true
