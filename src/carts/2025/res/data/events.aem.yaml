events:
    story.node.enter:
        channel: music
        rules:
            - when:
                  and:
                      - equals:
                            just_finished_combat: true
                      - equals:
                            last_combat_monster_imgid: monster_heer_later
              go:
                  music_transition:
                      audio_id: m11
                      sync: immediate
                      fade_ms: 250
            - when:
                  and:
                      - equals:
                            just_finished_combat: true
                      - equals:
                            last_combat_monster_imgid: monster_spiegel
              go:
                  music_transition:
                      audio_id: m05
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      bg: titel
              go:
                  music_transition:
                      audio_id: m02
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      bg: igor
              go:
                  music_transition:
                      audio_id: m02
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      bg: sint_blij
              go:
                  music_transition:
                      audio_id: m02
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      label: 'ORDEEL DES SINTS'
              go:
                  music_transition:
                      audio_id: m02
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      node_id: intro
              go:
                  music_transition:
                      audio_id: m05
                      sync: immediate
                      fade_ms: 250
            - when:
                  in:
                      label: ['MONDAY']
              go:
                  music_transition:
                      audio_id: m05
                      sync: immediate
                      fade_ms: 250
            - when:
                  in:
                      label: ['MONDAY AFTERNOON']
              go:
                  music_transition:
                      audio_id: m12
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      label: 'MONDAY EVENING'
              go:
                  music_transition:
                      audio_id: m04
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      label: 'MONDAY NIGHT'
              go:
                  music_transition:
                      audio_id: m04
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      label: 'TUESDAY MORNING'
              go:
                  music_transition:
                      audio_id: m06
                      sync: immediate
                      fade_ms: 250

            - when:
                  equals:
                      label: 'TUESDAY AFTERNOON'
              go:
                  music_transition:
                      audio_id: m12
                      sync: immediate
                      fade_ms: 250
            - when:
                  equals:
                      label: 'THURSDAY MORNING'
              go:
                  music_transition:
                      audio_id: m08
                      sync: immediate
                      fade_ms: 100

    combat.start:
        channel: music
        rules:
            - when:
                  equals:
                      monster_imgid: monster_snoozer
              go:
                  music_transition:
                      audio_id: m16
                      sync: immediate
                      fade_ms: 50
            - when:
                  equals:
                      monster_imgid: monster_spiegel
              go:
                  music_transition:
                      audio_id: m35
                      sync: immediate
                      fade_ms: 50
            - when:
                  equals:
                      monster_imgid: monster_heer_later
              go:
                  music_transition:
                      audio_id: m10
                      sync: immediate
                      fade_ms: 50

    combat.results:
        channel: music
        rules:
            - go:
                  music_transition:
                      audio_id: m17
                      sync: immediate
                      fade_ms: 150
