attacksfx:
  pitchRange: [-0.01, 0.01] # Random pitch variation between -0.01 and 0.01
  volumeRange: [-1, 1]   # Random volume variation between -1dB and +1dB
  offsetRange: [-0.05, 0.05]    # Random playback offset between -0.05 and 0.05 seconds
  playbackRateRange: null # Random playback rate not set
  filter: null # Random filter not set
    # type: "lowpass"      # Low-pass filter
    # frequency: 1000      # Frequency set to 1000 Hz
    # q: 1.0               # Quality factor (Q) set to 1.0
    # gain: 0              # Gain set to 0 dB
hitsfx:
  pitchRange: [-0.05, 0.05]
  volumeRange: [-3, 3]
  offsetRange: null
  playbackRateRange: null
  filter: null