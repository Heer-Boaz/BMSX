$type: bmsx.audio.eventmap.v1
events:
  combat.attack:
    channel: sfx
    maxVoices: 1
    policy: replace
    rules:
      - when:
          equals:
            weaponClass: heavy
        do:
          audioId: kick
          modulationPreset: attacksfx
          priority: 1
          cooldownMs: 40
      - when:
          equals:
            weaponClass: light
        do:
          audioId: punch
          modulationPreset: attacksfx
          priority: 1
          cooldownMs: 40
  combat.hit:
    channel: sfx
    policy: replace
    rules:
      - when:
          equals:
            weaponClass: light
        do:
          # Randomized pick between two light-hit variants, avoid immediate repeat
          oneOf:
            - { audioId: hit1, modulationPreset: hitsfx, weight: 2 }
            - { audioId: hit2, modulationPreset: hitsfx, weight: 1 }
          pick: weighted
          avoidRepeat: true
          # priority/cooldown can be specified per choice above if needed
      - when:
          equals:
            weaponClass: heavy
        do:
          audioId: hit2
          modulationPreset: hitsfx
          priority: 2
      # - when:
      #     equals:
      #       result: block
      #       material: shield
      #   do:
      #     audioId: Hit_Shield_Clang
      #     modulationPreset: hitsfx
      #     priority: 1

  # --- Demonstration events showcasing new matcher features ---
  demo.in_operator:
    channel: sfx
    rules:
      - when:
          # IN-alias: anyOf / in both supported
          in:
            material: [wood, stone, metal]
        do:
          audioId: hit1
          modulationPreset: hitsfx

  demo.or_and_not:
    channel: sfx
    rules:
      - when:
          # OR composition with a NOT guard
          or:
            - equals: { result: hit }
            - equals: { result: crit }
          not:
            equals: { material: barrier }
        do:
          audioId: hit2
          modulationPreset: hitsfx

  demo.random_uniform:
    channel: sfx
    rules:
      - do:
          # Uniform random, avoid repeating last choice
          oneOf:
            - { audioId: hit1, modulationPreset: hitsfx }
            - { audioId: hit2, modulationPreset: hitsfx }
          pick: uniform
          avoidRepeat: true

  demo.random_weighted:
    channel: sfx
    rules:
      - do:
          # Weighted random: prefer hit2 (3:1)
          oneOf:
            - { audioId: hit1, modulationPreset: hitsfx, weight: 1 }
            - { audioId: hit2, modulationPreset: hitsfx, weight: 3 }
          pick: weighted
          avoidRepeat: true
