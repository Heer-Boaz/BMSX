events:
    combat.attack:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - when:
                  equals:
                      weaponClass: heavy
              go:
                  audio_id: kick
                  modulation_preset: modulationparams.attacksfx
                  priority: 1
                  cooldown_ms: 40
            - when:
                  equals:
                      weaponClass: light
              go:
                  audio_id: punch
                  modulation_preset: modulationparams.attacksfx
                  priority: 1
                  cooldown_ms: 40
    combat.hit:
        channel: sfx
        max_voices: 1
        policy: replace
        rules:
            - when:
                  equals:
                      weaponClass: light
              go:
                  # Randomized pick between two light-hit variants, avoid immediate repeat
                  one_of:
                      - {
                            audio_id: hit1,
                            modulation_preset: modulationparams.hitsfx,
                            weight: 2,
                        }
                      - {
                            audio_id: hit2,
                            modulation_preset: modulationparams.hitsfx,
                            weight: 1,S
                        }
                  pick: weighted
                  avoid_repeat: true
                  # priority/cooldown can be specified per choice above if needed
            - when:
                  equals:
                      weaponClass: heavy
              go:
                  audio_id: hit2
                  modulation_preset: modulationparams.hitsfx
                  priority: 2
    humiliated_animation_start:
        channel: sfx
        max_voices: 1
        rules:
            - go:
                  audio_id: stuk
                  priority: 10
    # --- Demonstration events showcasing new matcher features ---
    demo.in_operator:
        channel: sfx
        max_voices: 1
        rules:
            - when:
                  # IN-alias: any_of / in both supported
                  in:
                      material: [wood, stone, metal]
              go:
                  audio_id: hit1
                  modulation_preset: modulationparams.hitsfx

    demo.or_and_not:
        channel: sfx
        rules:
            - when:
                  # OR composition with a NOT guard
                  or:
                      - equals: { result: hit }
                      - equals: { result: crit }
                  not:
                      equals: { material: barrier }
              go:
                  audio_id: hit2
                  modulation_preset: modulationparams.hitsfx

    demo.random_uniform:
        channel: sfx
        rules:
            - go:
                  # Uniform random, avoid repeating last choice
                  one_of:
                      - {
                            audio_id: hit1,
                            modulation_preset: modulationparams.hitsfx,
                        }
                      - {
                            audio_id: hit2,
                            modulation_preset: modulationparams.hitsfx,
                        }
                  pick: uniform
                  avoid_repeat: true

    demo.random_weighted:
        channel: sfx
        rules:
            - go:
                  # Weighted random: prefer hit2 (3:1)
                  one_of:
                      - {
                            audio_id: hit1,
                            modulation_preset: modulationparams.hitsfx,
                            weight: 1,
                        }
                      - {
                            audio_id: hit2,
                            modulation_preset: modulationparams.hitsfx,
                            weight: 3,
                        }
                  pick: weighted
                  avoid_repeat: true

    # --- Music examples using music_transition ---
    music.enter_explore:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: trainen # explore/ambient theme
                      sync: loop # align to current loop boundary if something is already playing
                      fade_ms: 300

    music.enter_combat:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: knokken # combat theme
                      sync: loop # wait for source loop wrap, then switch
                      fade_ms: 250
                      start_at_loop_start: true # skip target intro if it has a loop point

    music.leave_combat:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: trainen # back to explore
                      sync: loop
                      fade_ms: 300

    music.victory:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      sync:
                          stinger: vernederdans # play stinger immediately
                          return_to: trainen
                      audio_id: trainen # then return to explore theme
                      fade_ms: 200
    music.victory_alt:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      sync:
                          stinger: vernederdans # play stinger immediately
                          return_to: trainen # then return to explore theme
                      #   audio_id: trainen
                      fade_ms: 200

    music.gameover:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: gameover # game over music
                      sync: immediate # start right away
                      fade_ms: 150

    music.cutscene_intro:
        channel: music
        max_voices: 1
        rules:
            - go:
                  music_transition:
                      audio_id: start # title/intro theme
                      sync: { delay_ms: 500 } # delay start by 0.5s (e.g., after sfx)
                      fade_ms: 400
