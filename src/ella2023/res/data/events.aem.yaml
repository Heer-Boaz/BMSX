events:
    combat.attack:
        channel: sfx
        maxVoices: 1
        policy: replace
        rules:
            - when:
                  equals:
                      weaponClass: heavy
              go:
                  audioId: kick
                  modulationPreset: modulationparams.attacksfx
                  priority: 1
                  cooldownMs: 40
            - when:
                  equals:
                      weaponClass: light
              go:
                  audioId: punch
                  modulationPreset: modulationparams.attacksfx
                  priority: 1
                  cooldownMs: 40
    combat.hit:
        channel: sfx
        maxVoices: 1
        policy: replace
        rules:
            - when:
                  equals:
                      weaponClass: light
              go:
                  # Randomized pick between two light-hit variants, avoid immediate repeat
                  oneOf:
                      - {
                            audioId: hit1,
                            modulationPreset: modulationparams.hitsfx,
                            weight: 2,
                        }
                      - {
                            audioId: hit2,
                            modulationPreset: modulationparams.hitsfx,
                            weight: 1,S
                        }
                  pick: weighted
                  avoidRepeat: true
                  # priority/cooldown can be specified per choice above if needed
            - when:
                  equals:
                      weaponClass: heavy
              go:
                  audioId: hit2
                  modulationPreset: modulationparams.hitsfx
                  priority: 2
    humiliated_animation_start:
        channel: sfx
        maxVoices: 1
        rules:
            - go:
                  audioId: stuk
                  priority: 10
    # --- Demonstration events showcasing new matcher features ---
    demo.in_operator:
        channel: sfx
        maxVoices: 1
        rules:
            - when:
                  # IN-alias: anyOf / in both supported
                  in:
                      material: [wood, stone, metal]
              go:
                  audioId: hit1
                  modulationPreset: modulationparams.hitsfx

    demo.or_and_not:
        channel: sfx
        rules:
            - when:
                  # OR composition with a NOT guard
                  or:
                      - equals: { result: hit }
                      - equals: { result: crit }
                  not:
                      equals: { material: barrier }
              go:
                  audioId: hit2
                  modulationPreset: modulationparams.hitsfx

    demo.random_uniform:
        channel: sfx
        rules:
            - go:
                  # Uniform random, avoid repeating last choice
                  oneOf:
                      - {
                            audioId: hit1,
                            modulationPreset: modulationparams.hitsfx,
                        }
                      - {
                            audioId: hit2,
                            modulationPreset: modulationparams.hitsfx,
                        }
                  pick: uniform
                  avoidRepeat: true

    demo.random_weighted:
        channel: sfx
        rules:
            - go:
                  # Weighted random: prefer hit2 (3:1)
                  oneOf:
                      - {
                            audioId: hit1,
                            modulationPreset: modulationparams.hitsfx,
                            weight: 1,
                        }
                      - {
                            audioId: hit2,
                            modulationPreset: modulationparams.hitsfx,
                            weight: 3,
                        }
                  pick: weighted
                  avoidRepeat: true

    # --- Music examples using musicTransition ---
    music.enter_explore:
        channel: music
        maxVoices: 1
        rules:
            - go:
                  musicTransition:
                      audioId: trainen # explore/ambient theme
                      sync: loop # align to current loop boundary if something is already playing
                      fadeMs: 300

    music.enter_combat:
        channel: music
        maxVoices: 1
        rules:
            - go:
                  musicTransition:
                      audioId: knokken # combat theme
                      sync: loop # wait for source loop wrap, then switch
                      fadeMs: 250
                      startAtLoopStart: true # skip target intro if it has a loop point

    music.leave_combat:
        channel: music
        maxVoices: 1
        rules:
            - go:
                  musicTransition:
                      audioId: trainen # back to explore
                      sync: loop
                      fadeMs: 300

    music.victory:
        channel: music
        maxVoices: 1
        rules:
            - go:
                  musicTransition:
                      sync:
                          stinger: vernederdans # play stinger immediately
                          returnTo: trainen
                      audioId: trainen # then return to explore theme
                      fadeMs: 200
    music.victory_alt:
        channel: music
        maxVoices: 1
        rules:
            - go:
                  musicTransition:
                      sync:
                          stinger: vernederdans # play stinger immediately
                          returnTo: trainen # then return to explore theme
                      #   audioId: trainen
                      fadeMs: 200

    music.gameover:
        channel: music
        maxVoices: 1
        rules:
            - go:
                  musicTransition:
                      audioId: gameover # game over music
                      sync: immediate # start right away
                      fadeMs: 150

    music.cutscene_intro:
        channel: music
        maxVoices: 1
        rules:
            - go:
                  musicTransition:
                      audioId: start # title/intro theme
                      sync: { delayMs: 500 } # delay start by 0.5s (e.g., after sfx)
                      fadeMs: 400
