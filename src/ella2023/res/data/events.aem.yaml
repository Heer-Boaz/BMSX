$type: bmsx.audio.eventmap.v1
events:
  combat.attack:
    channel: sfx
    maxVoices: 1
    policy: replace
    rules:
      - when:
          equals:
            weaponClass: heavy
        do:
          audioId: kick
          modulationPreset: attacksfx
          priority: 1
          cooldownMs: 40
      - when:
          equals:
            weaponClass: light
        do:
          audioId: punch
          modulationPreset: attacksfx
          priority: 1
          cooldownMs: 40
  combat.hit:
    channel: sfx
    policy: replace
    rules:
      - when:
          equals:
            weaponClass: light
        do:
          audioId: hit1
          modulationPreset: hitsfx
          priority: 2
      - when:
          equals:
            weaponClass: heavy
        do:
          audioId: hit2
          modulationPreset: hitsfx
          priority: 2
      # - when:
      #     equals:
      #       result: block
      #       material: shield
      #   do:
      #     audioId: Hit_Shield_Clang
      #     modulationPreset: hitsfx
      #     priority: 1