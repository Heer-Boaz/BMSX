is_concurrent: true
on:
    i_was_hit:
        do:
            set_ticks_to_last_frame: true
    i_hit_face:
        do:
            set_ticks_to_last_frame: true
    animationEnd:
        do:
            - when:
                  value_equals:
                      left: '@payload.animation_name'
                      equals: highkick
              then:
                  dispatch_event:
                      event: go_idle
                      emitter: '@self'
            - when:
                  value_equals:
                      left: '@payload.animation_name'
                      equals: punch
              then:
                  dispatch_event:
                      event: go_idle
                      emitter: '@self'
            - when:
                  value_equals:
                      left: '@payload.animation_name'
                      equals: lowkick
              then:
                  dispatch_event:
                      event: go_idle
                      emitter: '@self'
            - when:
                  value_equals:
                      left: '@payload.animation_name'
                      equals: flyingkick
              then:
                  dispatch_event:
                      event: flyingkick_end
                      emitter: '@self.id'
            - when:
                  and:
                      - value_equals:
                            left: '@payload.animation_name'
                            equals: duckkick
                      - not:
                            - value_equals:
                                  left: '@self.performingStoerheidsdans'
                                  equals: true
              then:
                  dispatch_event:
                      event: go_duck
                      emitter: '@self'
    animate_idle:
        switch: _idle
    animate_humiliated: humiliated
    animate_walk:
        force_leaf: walk/_walk1
    animate_punch: punch
    animate_highkick: highkick
    animate_flyingkick: flyingkick
    animate_lowkick: lowkick
    animate_duckkick: duckkick
    animate_duck: duck
    animate_jump: jump
states:
    _idle:
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.idle'
    walk:
        automatic_reset_mode: subtree
        # on:
        #     $animate_walk: no-op
        states:
            _walk1:
                ticks2advance_tape: 8
                entering_state:
                    - set_property:
                          target: imgid
                          value: '@self.animSprites.walk'
                tape_next: ../walk2
            walk2:
                ticks2advance_tape: 8
                entering_state:
                    - set_property:
                          target: imgid
                          value: '@self.animSprites.walk_alt'
                tape_next: ../_walk1
    highkick:
        ticks2advance_tape: 15
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.highkick'
            - emit:
                  event: combat.attack
                  payload:
                      animation_name: highkick
                      weaponClass: heavy
        tape_next:
            - emit:
                event: animationEnd
                payload:
                    animation_name: highkick
            - emit:
                event: fighter.attack.animation.highkick.finished
                scope: self
                payload:
                    attackType: highkick
    lowkick:
        ticks2advance_tape: 15
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.lowkick'
            - emit:
                  event: combat.attack
                  payload:
                      animation_name: lowkick
                      weaponClass: heavy
        tape_next:
            - emit:
                event: animationEnd
                payload:
                    animation_name: lowkick
            - emit:
                event: fighter.attack.animation.lowkick.finished
                scope: self
                payload:
                    attackType: lowkick
    punch:
        ticks2advance_tape: 15
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.punch'
            - emit:
                  event: combat.attack
                  payload:
                      animation_name: punch
                      weaponClass: light
        tape_next:
            - emit:
                event: animationEnd
                payload:
                    animation_name: punch
            - emit:
                event: fighter.attack.animation.punch.finished
                scope: self
                payload:
                    attackType: punch
    duckkick:
        ticks2advance_tape: 15
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.duckkick'
            - emit:
                  event: combat.attack
                  payload:
                      animation_name: duckkick
                      weaponClass: light
        tape_next:
            - emit:
                event: animationEnd
                payload:
                    animation_name: duckkick
            - emit:
                event: fighter.attack.animation.duckkick.finished
                scope: self
                payload:
                    attackType: duckkick
    flyingkick:
        ticks2advance_tape: 15
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.flyingkick'
            - emit:
                  event: combat.attack
                  payload:
                      animation_name: flyingkick
                      weaponClass: heavy
        tape_next:
            - emit:
                event: animationEnd
                payload:
                    animation_name: flyingkick
            - emit:
                event: fighter.attack.animation.flyingkick.finished
                scope: self
                payload:
                    attackType: flyingkick
    duck:
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.duck'
    jump:
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.jump'
    humiliated:
        ticks2advance_tape: 300
        entering_state:
            - set_property:
                  target: imgid
                  value: '@self.animSprites.humiliated'
            - emit:
                  event: humiliated_animation_start
                  payload:
                      character: '@self.humiliatedCharacterId'
        tape_next:
            emit:
                event: humiliated_animation_end
                payload:
                    character: '@self.humiliatedCharacterId'
