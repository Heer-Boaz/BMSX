is_concurrent: true
on:
    $i_was_hit:
        do:
            set_ticks_to_last_frame: true
    $i_hit_face:
        do:
            set_ticks_to_last_frame: true
    $animationEnd:
        do:
            - when:
                  value_equals:
                      left: '@args[0].animation_name'
                      equals: highkick
              then:
                  dispatch_event:
                      event: go_idle
                      emitter: '@self'
            - when:
                  value_equals:
                      left: '@args[0].animation_name'
                      equals: punch
              then:
                  dispatch_event:
                      event: go_idle
                      emitter: '@self'
            - when:
                  value_equals:
                      left: '@args[0].animation_name'
                      equals: lowkick
              then:
                  dispatch_event:
                      event: go_idle
                      emitter: '@self'
            - when:
                  value_equals:
                      left: '@args[0].animation_name'
                      equals: flyingkick
              then:
                  dispatch_event:
                      event: flyingkick_end
                      emitter: '@self.id'
            - when:
                  and:
                      - value_equals:
                            left: '@args[0].animation_name'
                            equals: duckkick
                      - not:
                            state_matches:
                                machine: player_animation
                                path: stoerheidsdans
              then:
                  dispatch_event:
                      event: go_duck
                      emitter: '@self'
    $animate_idle: idle
    $animate_humiliated: humiliated
    $animate_walk: walk
    $animate_punch: punch
    $animate_highkick: highkick
    $animate_flyingkick: flyingkick
    $animate_lowkick: lowkick
    $animate_duckkick: duckkick
    $animate_duck: duck
    $animate_jump: jump
states:
    _idle:
        entering_state:
            - set_property:
                  target: imgid
                  value: eila_idle
            - set_property:
                  target: attacking
                  value: false
            - set_property:
                  target: currentAttackType
                  value: null
    walk:
        automatic_reset_mode: subtree
        entering_state:
            - set_property:
                  target: attacking
                  value: false
            - when:
                  state_not_matches:
                      machine: player_animation
                      path: walk
              then:
                  dispatch_event:
                      event: animate_walk
                      emitter: '@self'
        states:
            _walk1:
                ticks2advance_tape: 8
                entering_state:
                    - set_property:
                          target: imgid
                          value: eila_walk
                tape_next: ../walk2
            walk2:
                ticks2advance_tape: 8
                entering_state:
                    - set_property:
                          target: imgid
                          value: eila_idle
                tape_next: ../walk1
    highkick:
        ticks2advance_tape: 15
        entering_state:
            - blend_profile:
                  profile: attack_upper
                  fade: 0.1
            - set_property:
                  target: imgid
                  value: eila_highkick
            - set_property:
                  target: attacking
                  value: true
            - set_property:
                  target: currentAttackType
                  value: highkick
            - play_montage:
                  montage: eila_highkick
                  rate: 1
            - emit:
                  event: combat.attack
                  payload:
                      weaponClass: heavy
                      actorId: '@self.id'
            - when:
                  arg_equals:
                      index: 0
                      equals: true
              then:
                  set_ticks_to_last_frame: true
        tape_next:
            emit:
                event: animationEnd
                payload:
                    animation_name: highkick
    lowkick:
        ticks2advance_tape: 15
        entering_state:
            - blend_profile:
                  profile: attack_lower
                  fade: 0.1
            - set_property:
                  target: imgid
                  value: eila_lowkick
            - set_property:
                  target: attacking
                  value: true
            - set_property:
                  target: currentAttackType
                  value: lowkick
            - play_montage:
                  montage: eila_lowkick
                  rate: 1
            - emit:
                  event: combat.attack
                  payload:
                      weaponClass: heavy
                      actorId: '@self.id'
            - when:
                  arg_equals:
                      index: 0
                      equals: true
              then:
                  set_ticks_to_last_frame: true
        tape_next:
            emit:
                event: animationEnd
                payload:
                    animation_name: lowkick
    punch:
        ticks2advance_tape: 15
        entering_state:
            - blend_profile:
                  profile: attack_upper
                  fade: 0.1
            - set_property:
                  target: imgid
                  value: eila_punch
            - set_property:
                  target: attacking
                  value: true
            - set_property:
                  target: currentAttackType
                  value: punch
            - play_montage:
                  montage: eila_punch
                  rate: 1.1
            - emit:
                  event: combat.attack
                  payload:
                      weaponClass: light
                      actorId: '@self.id'
            - when:
                  arg_equals:
                      index: 0
                      equals: true
              then:
                  set_ticks_to_last_frame: true
        tape_next:
            emit:
                event: animationEnd
                payload:
                    animation_name: punch
    duckkick:
        ticks2advance_tape: 15
        entering_state:
            - blend_profile:
                  profile: attack_lower
                  fade: 0.05
            - set_property:
                  target: imgid
                  value: eila_duckkick
            - set_property:
                  target: attacking
                  value: true
            - set_property:
                  target: currentAttackType
                  value: duckkick
            - play_montage:
                  montage: eila_duckkick
            - emit:
                  event: combat.attack
                  payload:
                      weaponClass: heavy
                      actorId: '@self.id'
        tape_next:
            emit:
                event: animationEnd
                payload:
                    animation_name: duckkick
    flyingkick:
        ticks2advance_tape: 15
        entering_state:
            - blend_profile:
                  profile: attack_air
                  fade: 0.1
            - set_property:
                  target: imgid
                  value: eila_flyingkick
            - set_property:
                  target: attacking
                  value: true
            - set_property:
                  target: currentAttackType
                  value: flyingkick
            - play_montage:
                  montage: eila_flyingkick
            - emit:
                  event: combat.attack
                  payload:
                      weaponClass: heavy
                      actorId: '@self.id'
            - when:
                  arg_equals:
                      index: 0
                      equals: true
              then:
                  set_ticks_to_last_frame: true
        tape_next:
            emit:
                event: animationEnd
                payload:
                    animation_name: flyingkick
    duck:
        entering_state:
            - set_property:
                  target: imgid
                  value: eila_duck
    jump:
        entering_state:
            - set_property:
                  target: imgid
                  value: eila_jump
    humiliated:
        ticks2advance_tape: 300
        entering_state:
            - set_property:
                  target: imgid
                  value: eila_humiliated
            - emit:
                  event: humiliated_animation_start
                  payload:
                      character: eila
        tape_next:
            emit:
                event: humiliated_animation_end
                payload:
                    character: eila
