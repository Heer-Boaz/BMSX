on:
    mode.locomotion.idle:
        if:
            and:
                - state_not_matches: './stoerheidsdans'
                - state_not_matches: './nagenieten'
                - state_not_matches: './humiliated'
        switch: './_grounded/_idle'
    mode.locomotion.walk:
        if:
            and:
                - state_not_matches: './stoerheidsdans'
                - state_not_matches: './nagenieten'
                - state_not_matches: './humiliated'
        switch: './_grounded/walk'
    mode.action.attack:
        do:
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: flyingkick
              then:
                  switch: './airborne/_jump/flyingkick/active'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: punch
              then:
                  to:
                      state_id: './_grounded/attack'
                      payload: '@payload'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: highkick
              then:
                  to:
                      state_id: './_grounded/attack'
                      payload: '@payload'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: lowkick
              then:
                  to:
                      state_id: './_grounded/attack'
                      payload: '@payload'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: duckkick
              then:
                  to:
                      state_id: './_grounded/attack'
                      payload: '@payload'
    mode.control.duck: './_grounded/duck'
    mode.control.jump:
        to:
            state_id: './airborne/_jump'
            payload: '@payload'
    mode.control.stoerheidsdans: './stoerheidsdans'
    mode.impact.humiliated: './humiliated'
states:
    _grounded:
        entering_state:
            - add_tag: state.grounded
            - remove_tag: state.airborne
        states:
            _idle:
                input_event_handlers:
                    'duck[p]':
                        do:
                            - dispatch_event:
                                  event: mode.control.duck
                                  emitter: '@self'
                    'jump_right[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: right
                            - dispatch_event:
                                event: mode.control.jump
                                emitter: '@self'
                                payload:
                                    direction: right
                            - consume_action: jump
                    'jump_left[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: left
                            - dispatch_event:
                                event: mode.control.jump
                                emitter: '@self'
                                payload:
                                    direction: left
                            - consume_action: jump
                    'jump[j]':
                        do:
                            - dispatch_event:
                                event: mode.control.jump
                                emitter: '@self'
                                payload: {}
                            - consume_action: jump
                    'right[p]':
                        do:
                            - set_property:
                                  target: facing
                                  value: right
                            - dispatch_event:
                                  event: mode.locomotion.walk
                                  emitter: '@self'
                                  payload:
                                      direction: right
                    'left[p]':
                        do:
                            - set_property:
                                  target: facing
                                  value: left
                            - dispatch_event:
                                  event: mode.locomotion.walk
                                  emitter: '@self'
                                  payload:
                                      direction: left
                entering_state:
                    - call:
                          target: '@self.onIdleEntered'
                    - emit:
                          event: animate_idle
                          emitter: '@self'
            walk:
                entering_state:
                    - call:
                          target: '@self.onWalkEntered'
                    - emit:
                          event: animate_walk
                          emitter: '@self'
                input_event_handlers:
                    'duck[p]':
                        do:
                            - dispatch_event:
                                  event: mode.control.duck
                                  emitter: '@self'
                    'jump_right[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: right
                            - dispatch_event:
                                event: mode.control.jump
                                emitter: '@self'
                                payload:
                                    direction: right
                            - consume_action: jump
                    'jump_left[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: left
                            - dispatch_event:
                                event: mode.control.jump
                                emitter: '@self'
                                payload:
                                    direction: left
                            - consume_action: jump
                    'jump[j]':
                        do:
                            - dispatch_event:
                                event: mode.control.jump
                                emitter: '@self'
                                payload: {}
                            - consume_action: jump
                    'left[p]':
                        do:
                            call:
                                target: '@self.walkStep'
                                args: ['left']
                    'right[p]':
                        do:
                            call:
                                target: '@self.walkStep'
                                args: ['right']
                    '&(left[!p], right[!p])':
                        do:
                            - dispatch_event:
                                  event: mode.locomotion.idle
                                  emitter: '@self'
            duck:
                entering_state:
                    - call:
                          target: '@self.setDuckingState'
                          args: [true]
                    - add_tag: state.ducking
                    - call:
                          target: '@self.onDuckEntered'
                    - emit:
                          event: animate_duck
                          emitter: '@self'
                exiting_state:
                    - call:
                          target: '@self.setDuckingState'
                          args: [false]
                    - remove_tag: state.ducking
                    - call:
                          target: '@self.onDuckExited'
                input_event_handlers:
                    'duck[!p]':
                        do:
                            - dispatch_event:
                                  event: mode.locomotion.idle
                                  emitter: '@self'
                    'left[p]':
                        do:
                            - set_property:
                                  target: facing
                                  value: left
                    'right[p]':
                        do:
                            - set_property:
                                  target: facing
                                  value: right
            attack:
                data:
                    currentAttack: null
                entering_state:
                    - set_property:
                          target: '@state.data.currentAttack'
                          value: '@payload.attackType'
                    - call:
                          target: '@self.startAttack'
                          args: ['@payload.attackType']
                    - add_tag: state.attacking
                    - when:
                          value_equals:
                              left: '@payload.attackType'
                              equals: duckkick
                      then:
                          add_tag: state.ducking
                    - when:
                          value_equals:
                              left: '@payload.attackType'
                              equals: flyingkick
                      then:
                          add_tag: state.airborne
                on:
                    mode.action.complete: '/_grounded/_idle'
                exiting_state:
                    - call:
                          target: '@self.finishAttack'
                          args: ['@state.data.currentAttack']
                    - remove_tag: state.attacking
                    - when:
                          value_equals:
                              left: '@state.data.currentAttack'
                              equals: duckkick
                      then:
                          remove_tag: state.ducking
                    - when:
                          value_equals:
                              left: '@state.data.currentAttack'
                              equals: flyingkick
                      then:
                          remove_tag: state.airborne
                    - set_property:
                          target: '@state.data.currentAttack'
                          value: null
    airborne:
        states:
            _jump:
                automatic_reset_mode: tree
                entering_state:
                    - add_tag: state.airborne
                    - remove_tag: state.grounded
                    - call:
                          target: '@self.startJump'
                          args: ['@state', '@payload']
                    - emit:
                          event: animate_jump
                          emitter: '@self'
                exiting_state:
                    - remove_tag: state.airborne
                    - add_tag: state.grounded
                    - call:
                          target: '@self.finishJump'
                input_event_handlers:
                    # Airborne attacks are handled via FighterAbilityInputService
                states:
                    _ascending:
                        ticks2advance_tape: 30
                        tick:
                            call:
                                target: '@self.jumpAscendingTick'
                                args: ['@state']
                        tape_next: '../descending'
                    descending:
                        ticks2advance_tape: 30
                        tick:
                            call:
                                target: '@self.jumpDescendingTick'
                                args: ['@state']
                        tape_next: '/_grounded/_idle'
                    flyingkick:
                        is_concurrent: true
                        states:
                            _ready: {}
                            active:
                                entering_state:
                                    - call:
                                          target: '@self.performAttack'
                                          args: ['flyingkick']
                                    - add_tag: state.attacking
                                exiting_state:
                                    - call:
                                          target: '@self.completeAttack'
                                          args: ['flyingkick']
                                    - remove_tag: state.attacking
                                    - dispatch_event:
                                          event: animate_jump
                                          emitter: '@self'
                                on:
                                    flyingkick_end: '../_ready'
    stoerheidsdans:
        enable_tape_autotick: false
        ticks2advance_tape: 1
        tape_data: [highkick, lowkick, duckkick, punch, punch]
        repetitions: 2
        tape_playback_mode: once
        data:
            expectedAnimation: null
        entering_state:
            - add_tag: state.combat_disabled
            - remove_tag: state.attacking
            - call:
                  target: '@self.enterStoerheidsdans'
                  args: ['@state']
        exiting_state:
            - remove_tag: state.combat_disabled
        on:
            animationEnd:
                do:
                    call:
                        target: '@self.handleStoerAnimationEnd'
                        args: ['@state', '@payload']
        tape_next:
            do:
                call:
                    target: '@self.handleStoerTapeNext'
                    args: ['@state', '@payload']
        tape_end:
            do:
                call:
                    target: '@self.completeStoerheidsdans'
                    args: ['@state']
            to: '/_nagenieten'
    nagenieten:
        entering_state:
            - add_tag: state.combat_disabled
            - call:
                  target: '@self.startNagenieten'
        exiting_state:
            - remove_tag: state.combat_disabled
            - call:
                  target: '@self.setFightingState'
                  args: [true]
    humiliated:
        entering_state:
            - add_tag: state.combat_disabled
            - remove_tag: state.attacking
            - remove_tag: state.airborne
            - add_tag: state.grounded
            - call:
                  target: '@self.enterHumiliated'
            - emit:
                  event: animate_humiliated
                  emitter: '@self'
        exiting_state:
            - remove_tag: state.combat_disabled
            - call:
                  target: '@self.exitHumiliated'
