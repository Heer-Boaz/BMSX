on:
    go_idle:
        if:
            and:
                - state_not_matches: './stoerheidsdans'
                - state_not_matches: './nagenieten'
                - state_not_matches: './humiliated'
        switch: './_grounded/_idle'
    go_walk: './_grounded/walk'
    go_attack:
        do:
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: punch
              then:
                  switch: './_grounded/attack/punch'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: highkick
              then:
                  switch: './_grounded/attack/highkick'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: lowkick
              then:
                  switch: './_grounded/attack/lowkick'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: duckkick
              then:
                  switch: './_grounded/attack/duckkick'
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: flyingkick
              then:
                  switch: './airborne/_jump/flyingkick/active'
    go_duck: './_grounded/duck'
    go_jump:
        to:
            state_id: './airborne/_jump'
            payload: '@payload'
    go_stoerheidsdans: './stoerheidsdans'
    go_humiliated: './humiliated'
states:
    _grounded:
        entering_state:
            - add_tag: state.grounded
            - remove_tag: state.airborne
        states:
            _idle:
                input_event_handlers:
                    'duck[p]': '../duck'
                    'jump_right[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: right
                            - dispatch_event:
                                event: go_jump
                                emitter: '@self'
                                payload:
                                    direction: right
                            - consume_action: jump
                    'jump_left[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: left
                            - dispatch_event:
                                event: go_jump
                                emitter: '@self'
                                payload:
                                    direction: left
                            - consume_action: jump
                    'jump[j]':
                        do:
                            - dispatch_event:
                                event: go_jump
                                emitter: '@self'
                                payload: {}
                            - consume_action: jump
                    'right[p]': '../walk'
                    'left[p]': '../walk'
                entering_state:
                    - call:
                          target: '@self.onIdleEntered'
                    - emit:
                          event: animate_idle
                          emitter: '@self'
            walk:
                entering_state:
                    - call:
                          target: '@self.onWalkEntered'
                    - emit:
                          event: animate_walk
                          emitter: '@self'
                input_event_handlers:
                    'duck[p]': '../duck'
                    'jump_right[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: right
                            - dispatch_event:
                                event: go_jump
                                emitter: '@self'
                                payload:
                                    direction: right
                            - consume_action: jump
                    'jump_left[j]':
                        do:
                            - set_property:
                                  target: facing
                                  value: left
                            - dispatch_event:
                                event: go_jump
                                emitter: '@self'
                                payload:
                                    direction: left
                            - consume_action: jump
                    'jump[j]':
                        do:
                            - dispatch_event:
                                event: go_jump
                                emitter: '@self'
                                payload: {}
                            - consume_action: jump
                    'left[p]':
                        do:
                            call:
                                target: '@self.walkStep'
                                args: ['left']
                    'right[p]':
                        do:
                            call:
                                target: '@self.walkStep'
                                args: ['right']
                    '&(left[!p], right[!p])': '../_idle'
            duck:
                entering_state:
                    - call:
                          target: '@self.setDuckingState'
                          args: [true]
                    - call:
                          target: '@self.onDuckEntered'
                    - emit:
                          event: animate_duck
                          emitter: '@self'
                exiting_state:
                    - call:
                          target: '@self.setDuckingState'
                          args: [false]
                    - call:
                          target: '@self.onDuckExited'
                input_event_handlers:
                    'duck[!p]': '../_idle'
                    'left[p]':
                        do:
                            - set_property:
                                  target: facing
                                  value: left
                    'right[p]':
                        do:
                            - set_property:
                                  target: facing
                                  value: right
            attack:
                states:
                    punch:
                        entering_state:
                            - call:
                                  target: '@self.performAttack'
                                  args: ['punch']
                        exiting_state:
                            - call:
                                  target: '@self.completeAttack'
                                  args: ['punch']
                    highkick:
                        entering_state:
                            - call:
                                  target: '@self.performAttack'
                                  args: ['highkick']
                        exiting_state:
                            - call:
                                  target: '@self.completeAttack'
                                  args: ['highkick']
                    lowkick:
                        entering_state:
                            - call:
                                  target: '@self.performAttack'
                                  args: ['lowkick']
                        exiting_state:
                            - call:
                                  target: '@self.completeAttack'
                                  args: ['lowkick']
                    duckkick:
                        entering_state:
                            - call:
                                  target: '@self.performAttack'
                                  args: ['duckkick']
                        exiting_state:
                            - call:
                                  target: '@self.completeAttack'
                                  args: ['duckkick']
    airborne:
        states:
            _jump:
                automatic_reset_mode: tree
                entering_state:
                    - call:
                          target: '@self.startJump'
                          args: ['@state', '@payload']
                    - emit:
                          event: animate_jump
                          emitter: '@self'
                exiting_state:
                    - call:
                          target: '@self.finishJump'
                input_event_handlers:
                    # Airborne attacks are handled via FighterAbilityInputService
                states:
                    _ascending:
                        ticks2advance_tape: 30
                        tick:
                            call:
                                target: '@self.jumpAscendingTick'
                                args: ['@state']
                        tape_next: '../descending'
                    descending:
                        ticks2advance_tape: 30
                        tick:
                            call:
                                target: '@self.jumpDescendingTick'
                                args: ['@state']
                        tape_next: '/_grounded/_idle'
                    flyingkick:
                        is_concurrent: true
                        states:
                            _ready: {}
                            active:
                                entering_state:
                                    - call:
                                          target: '@self.performAttack'
                                          args: ['flyingkick']
                                exiting_state:
                                    - call:
                                          target: '@self.completeAttack'
                                          args: ['flyingkick']
                                    - dispatch_event:
                                          event: animate_jump
                                          emitter: '@self'
                                on:
                                    flyingkick_end: '../_ready'
    stoerheidsdans:
        enable_tape_autotick: false
        ticks2advance_tape: 1
        tape_data: [highkick, lowkick, duckkick, punch, punch]
        repetitions: 2
        tape_playback_mode: once
        data:
            expectedAnimation: null
        entering_state:
            - call:
                  target: '@self.enterStoerheidsdans'
                  args: ['@state']
        on:
            animationEnd:
                do:
                    call:
                        target: '@self.handleStoerAnimationEnd'
                        args: ['@state', '@payload']
        tape_next:
            do:
                call:
                    target: '@self.handleStoerTapeNext'
                    args: ['@state', '@payload']
        tape_end:
            do:
                call:
                    target: '@self.completeStoerheidsdans'
                    args: ['@state']
            to: '/_nagenieten'
    nagenieten:
        entering_state:
            - call:
                  target: '@self.startNagenieten'
    humiliated:
        entering_state:
            - call:
                  target: '@self.enterHumiliated'
            - emit:
                  event: animate_humiliated
                  emitter: '@self'
        exiting_state:
            - call:
                  target: '@self.exitHumiliated'
