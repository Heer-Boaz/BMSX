input_eval: first

on:
    $mode.locomotion.idle:
        if:
            and:
                - state_not_matches: './stoerheidsdans'
                - state_not_matches: './nagenieten'
                - state_not_matches: './humiliated'
        switch: './_grounded/_idle'
    $mode.locomotion.walk:
        if:
            and:
                - state_not_matches: './stoerheidsdans'
                - state_not_matches: './nagenieten'
                - state_not_matches: './humiliated'
        to:
            state_id: './_grounded/walk'
            payload: '@payload'
    $mode.action.attack:
        do:
            - when:
                  value_equals:
                      left: '@payload.attackType'
                      equals: flyingkick
              then:
                  switch: './airborne/_jump/flyingkick/active'
              else:
                  to:
                      state_id: './_grounded/attack'
                      payload: '@payload'
    $mode.control.duck: './_grounded/duck'
    $mode.control.jump:
        to:
            state_id: './airborne/_jump'
            payload: '@payload'
    $mode.control.stoerheidsdans: './stoerheidsdans'
    $mode.impact.humiliated: './humiliated'

states:
    _grounded:
        entering_state:
            - tags:
                  add: [state.grounded]
                  remove: [state.airborne]
        states:
            _idle:
                entering_state:
                    - invoke: { fn: '@self.onIdleEntered' }
                    - emit: animate_idle
                    - tags: { remove: [state.attacking] }
            walk:
                data:
                    speedX: 0
                entering_state:
                    - tags: { remove: [state.attacking] }
                    - emit: animate_walk
                on:
                    mode.locomotion.walk:
                        do:
                            - invoke:
                                  {
                                      fn: '@self.configureWalkState',
                                      payload:
                                          {
                                              state: '@state',
                                              payload: '@payload',
                                          },
                                  }
            duck:
                entering_state:
                    - invoke: { fn: '@self.setDuckingState', payload: true }
                    - tags: { add: [state.ducking], remove: [state.attacking] }
                    - invoke: { fn: '@self.onDuckEntered' }
                    - emit: animate_duck
                exiting_state:
                    - invoke: { fn: '@self.setDuckingState', payload: false }
                    - tags: { remove: [state.ducking] }
                    - invoke: { fn: '@self.onDuckExited' }
            attack:
                data:
                    currentAttack: null
                entering_state:
                    - set:
                          {
                              target: '@state.data.currentAttack',
                              value: '@payload.attackType',
                          }
                    - invoke:
                          {
                              fn: '@self.startAttack',
                              payload: '@payload.attackType',
                          }
                    - tags: { add: [state.attacking] }
                on:
                    mode.action.complete: '/_grounded/_idle'
                exiting_state:
                    - invoke:
                          {
                              fn: '@self.finishAttack',
                              payload: '@state.data.currentAttack',
                          }
                    - tags: { remove: [state.attacking] }
                    - set: { target: '@state.data.currentAttack', value: null }
    airborne:
        states:
            _jump:
                automatic_reset_mode: tree
                entering_state:
                    - tags: { add: [state.airborne], remove: [state.grounded] }
                    - invoke:
                          {
                              fn: '@self.startJump',
                              payload: { state: '@state', payload: '@payload' },
                          }
                    - emit: animate_jump
                exiting_state:
                    - tags: { remove: [state.airborne], add: [state.grounded] }
                    - invoke: { fn: '@self.finishJump' }
                states:
                    _ascending:
                        ticks2advance_tape: 30
                        tick:
                            invoke:
                                {
                                    fn: '@self.jumpAscendingTick',
                                    payload: '@state',
                                }
                        tape_next: '../descending'
                    descending:
                        ticks2advance_tape: 30
                        tick:
                            invoke:
                                {
                                    fn: '@self.jumpDescendingTick',
                                    payload: '@state',
                                }
                        tape_next: '/_grounded/_idle'
                    flyingkick:
                        is_concurrent: true
                        states:
                            _ready: {}
                            active:
                                entering_state:
                                    - invoke:
                                          {
                                              fn: '@self.performAttack',
                                              payload: 'flyingkick',
                                          }
                                    - tags: { add: [state.attacking] }
                                exiting_state:
                                    - invoke:
                                          {
                                              fn: '@self.completeAttack',
                                              payload: 'flyingkick',
                                          }
                                    - tags: { remove: [state.attacking] }
                                    - emit: animate_jump
                                on:
                                    flyingkick_end: '../_ready'
    stoerheidsdans:
        enable_tape_autotick: false
        ticks2advance_tape: 1
        tape_data: [highkick, lowkick, duckkick, punch, punch]
        repetitions: 2
        tape_playback_mode: once
        data: { expectedAnimation: null }
        entering_state:
            - tags: { add: [state.combat_disabled], remove: [state.attacking] }
            - invoke: { fn: '@self.enterStoerheidsdans', payload: '@state' }
        exiting_state:
            - tags: { remove: [state.combat_disabled] }
        on:
            animationEnd:
                do:
                    - invoke:
                          {
                              fn: '@self.handleStoerAnimationEnd',
                              payload: { state: '@state', payload: '@payload' },
                          }
        tape_next:
            do:
                - invoke:
                      {
                          fn: '@self.handleStoerTapeNext',
                          payload: { state: '@state', payload: '@payload' },
                      }
        tape_end:
            do:
                - invoke:
                      { fn: '@self.completeStoerheidsdans', payload: '@state' }
            to: '/_nagenieten'
    nagenieten:
        entering_state:
            - tags: { add: [state.combat_disabled] }
            - invoke: { fn: '@self.startNagenieten' }
        exiting_state:
            - tags: { remove: [state.combat_disabled] }
            - invoke: { fn: '@self.setFightingState', payload: true }
    humiliated:
        entering_state:
            - tags:
                  {
                      add: [state.combat_disabled, state.grounded],
                      remove: [state.attacking, state.airborne],
                  }
            - invoke: { fn: '@self.enterHumiliated' }
            - emit: animate_humiliated
        exiting_state:
            - tags: { remove: [state.combat_disabled] }
            - invoke: { fn: '@self.exitHumiliated' }
