var basic = {
    rom: null,
    debug: false,
    set defusr(_rom) {
        basic.rom = _rom;
        if (basic.debug !== true) {
            let romcode = document.createElement('script');
            romcode.async = false;
            romcode.innerText = _rom.source;
            document.head.appendChild(romcode);
        }
    },
    usr(x) {
        let self = this;
        System.import('src/bootstrapper').then(function (bin) {
            document.body.style.backgroundColor = "#000000";
            bin.Bootstrapper.init(self.rom);
            self.rom = null;
        });
        return 255;
    },
    async bload(url) {
        let bootCompletePromise = awaitBootComplete();
        let rom = await loadRompack(url);
        let result = await loadResources(rom);
        setLoaderText("Press any key to start...");
        setClassForLoader("");
        await bootCompletePromise;
        let pressedAnyKey = awaitPressedAnyKey();
        await pressedAnyKey;
        return result;
    },
};
async function loadRompack(url) {
    return fetch(url)
        .then(response => response.arrayBuffer())
        .then(buffer => buffer)
        .catch(e => {
        setLoaderText("Failed to load rompack");
        setClassForLoader("");
        new Error(`Failed to load rompack.`);
        return null;
    });
}
async function loadImage(url) {
    return new Promise((resolve, reject) => {
        let img = new Image();
        img.onload = e => resolve(img);
        img.onerror = e => {
            throw new Error(`Failed to load image's URL: ${url}`);
        };
        img.src = url;
    });
}
async function loadAudio(url) {
    return new Promise((resolve, reject) => {
        let snd = new Audio();
        snd.onloadeddata = e => resolve(snd);
        snd.preload = 'auto';
        snd.loop = false;
        snd.controls = false;
        snd.onerror = (e => {
            throw new Error(`Failed to load audio's URL: ${url}`);
        });
        snd.src = url;
        snd.load();
    });
}
async function loadResourceList(rom) {
    let bytearray = new Uint8Array(rom);
    let sliced = bytearray.slice(bytearray.length - 100);
    let metaJsonStr = decodeuint8arr(sliced);
    let metaJson = JSON.parse(metaJsonStr);
    sliced = bytearray.slice(metaJson.start, metaJson.end);
    let resJsonStr = decodeuint8arr(sliced);
    let resJson = JSON.parse(resJsonStr);
    return resJson;
}
async function loadResources(rom) {
    let result = {
        images: new Map(),
        rom: rom,
        resources: {},
        source: null
    };
    let list = await loadResourceList(rom);
    for (let i = 0; i < list.length; i++) {
        await load(rom, list[i], result);
        result.resources[list[i].resid] = list[i];
    }
    return result;
}
async function load(rom, res, romResult) {
    switch (res.type) {
        case 'image':
            let mime;
            let blub;
            let url;
            let bytearray = new Uint8Array(rom);
            let sliced = bytearray.slice(res.start, res.end);
            mime = 'image/png';
            blub = new Blob([sliced], { type: mime });
            url = URL.createObjectURL(blub);
            let img = await loadImage(url);
            romResult.images.set(res.resid, img);
            break;
        case 'audio':
            break;
        case 'source':
            try {
                let bytearray = new Uint8Array(rom);
                let sliced = bytearray.slice(res.start, res.end);
                romResult.source = decodeuint8arr(sliced);
            }
            catch (e) {
                throw e;
            }
            break;
        default:
            throw Error(`Unrecognised resource type in rom: ${res.type}, while processing rompack`);
    }
}
async function awaitBootComplete() {
    let result = new Promise((resolve, reject) => {
        let msx = document.querySelector('#msx');
        msx.addEventListener('animationend', ev => {
            let loading = document.querySelector('#loading');
            loading.style.visibility = 'visible';
            resolve();
        });
        msx.className = "enter";
        if (basic.debug)
            resolve();
    });
    return result;
}
async function awaitPressedAnyKey() {
    let remove = (id) => {
        let element = document.querySelector(id);
        if (element)
            element.parentElement.removeChild(element);
    };
    let result = new Promise((resolve, reject) => {
        document.body.addEventListener('keydown', ev => {
            remove('#loading');
            remove('#msx');
            remove('#hidor');
            remove('#romjs');
            resolve();
        });
    });
    return result;
}
function setLoaderText(txt) {
    let loading = document.querySelector('#loading');
    loading.innerText = txt;
}
function setClassForLoader(cls) {
    let loading = document.querySelector('#loading');
    loading.className = "";
}
function decodeuint8arr(to_decode) {
    return new TextDecoder("utf-8").decode(to_decode);
}
function encodeuint8arr(to_encode) {
    return new TextEncoder().encode(to_encode);
}
